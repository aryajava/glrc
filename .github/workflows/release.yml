name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libcairo2-dev \
            libffi-dev \
            python3-dev \
            libfreetype6-dev \
            libjpeg-dev \
            zlib1g-dev \
            tk-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Build EN and ID binaries
        run: python scripts/build.py --lang all

      - name: Prepare Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist/glrc-en.exe "release-assets/glrc-en-windows.exe" -Force
          Copy-Item dist/glrc-id.exe "release-assets/glrc-id-windows.exe" -Force

      - name: Prepare Linux release assets
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-assets
          cp dist/glrc-en "release-assets/glrc-en-linux"
          cp dist/glrc-id "release-assets/glrc-id-linux"
          chmod +x "release-assets/glrc-en-linux" "release-assets/glrc-id-linux"

      - name: Prepare macOS release assets
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          cp dist/glrc-en "release-assets/glrc-en-macos"
          cp dist/glrc-id "release-assets/glrc-id-macos"
          chmod +x "release-assets/glrc-en-macos" "release-assets/glrc-id-macos"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release-assets/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for changelog)
        uses: actions/checkout@v4

      - name: Extract changelog for release body
        id: changelog
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VER="${TAG#v}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## version ${VER}$/,/^=+$/" CHANGELOG.md | head -n -1)
          # Use GitHub Actions delimiter for multiline output
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows-latest
          path: release-assets

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-ubuntu-latest
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-latest
          path: release-assets

      - name: Verify release assets
        run: |
          echo "=== Release assets ==="
          ls -la release-assets/
          echo "=== Checking expected files ==="
          for f in glrc-en-windows.exe glrc-id-windows.exe glrc-en-linux glrc-id-linux glrc-en-macos glrc-id-macos; do
            if [ -f "release-assets/$f" ]; then
              echo "✓ $f ($(stat -c%s "release-assets/$f") bytes)"
            else
              echo "✗ MISSING: $f"
              exit 1
            fi
          done

      - name: Remove old release assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = '${{ steps.tag.outputs.value }}';

            let release;
            try {
              const resp = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = resp.data;
            } catch (err) {
              core.info(`No existing release for tag ${tag}; skipping asset cleanup.`);
              return;
            }

            for (const asset of release.assets) {
              core.info(`Deleting asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id,
              });
            }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: false
          body: ${{ steps.changelog.outputs.body }}
          fail_on_unmatched_files: true
          files: |
            release-assets/glrc-en-windows.exe
            release-assets/glrc-id-windows.exe
            release-assets/glrc-en-linux
            release-assets/glrc-id-linux
            release-assets/glrc-en-macos
            release-assets/glrc-id-macos
