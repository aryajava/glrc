name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libcairo2-dev \
            libffi-dev \
            python3-dev \
            libfreetype6-dev \
            libjpeg-dev \
            zlib1g-dev \
            tk-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt

      - name: Build EN and ID binaries
        run: python scripts/build.py --lang all

      - name: Prepare Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist/glrc-en.exe release-assets/glrc-en-windows.exe -Force
          Copy-Item dist/glrc-id.exe release-assets/glrc-id-windows.exe -Force

      - name: Prepare Linux release assets
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-assets
          cp dist/glrc-en release-assets/glrc-en-linux
          cp dist/glrc-id release-assets/glrc-id-linux
          chmod +x release-assets/glrc-en-linux release-assets/glrc-id-linux

      - name: Prepare macOS release assets
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          cp dist/glrc-en release-assets/glrc-en-macos
          cp dist/glrc-id release-assets/glrc-id-macos
          chmod +x release-assets/glrc-en-macos release-assets/glrc-id-macos

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release-assets/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          body: |
            ## GLRC v1.0.0 Highlights
            - Multi-language desktop binaries: EN and ID
            - Cross-platform release assets for Windows, macOS, and Linux
            - Direct executable attachments (no zip/tar wrappers)
            - Unified build pipeline with VERSION-driven app metadata
            - Automatic icon generation (multi-size) and build asset bundling
            - UI/UX improvements: dialogs, pagination, profile token duration updates
          files: |
            release-assets/glrc-en-windows.exe
            release-assets/glrc-id-windows.exe
            release-assets/glrc-en-linux
            release-assets/glrc-id-linux
            release-assets/glrc-en-macos
            release-assets/glrc-id-macos
